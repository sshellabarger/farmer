  <text x="148" y="58" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="22" letter-spacing="1">LOCAL FOOD</text>
  <text x="148" y="86" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="22" letter-spacing="1">NETWORK</text>
  <!-- Tagline -->
  <text x="148" y="108" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-style="italic" font-size="14" letter-spacing="0.5">Eat local. Grow local.</text>
</svg>
