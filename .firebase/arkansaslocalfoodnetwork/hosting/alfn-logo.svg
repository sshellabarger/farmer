    <rect x="8" y="0" width="4" height="50" rx="2"/>
    <rect x="18" y="0" width="4" height="50" rx="2"/>
    <rect x="28" y="0" width="4" height="50" rx="2"/>
    <rect x="6" y="45" width="28" height="6" rx="3"/>
    <rect x="16" y="48" width="8" height="62" rx="4"/>
    <!-- Knife -->
    <path d="M46 0 C46 0 46 60 46 60 L46 110 L54 110 L54 60 C60 55 62 30 62 0 Z" />
    <!-- Spatula -->
    <rect x="70" y="50" width="12" height="60" rx="4"/>
