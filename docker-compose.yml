services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: farmlink
      POSTGRES_USER: farmlink
      POSTGRES_PASSWORD: farmlink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
