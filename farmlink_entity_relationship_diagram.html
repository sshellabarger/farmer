<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS ||--o| FARMS : "owns"
  USERS ||--o| MARKETS : "owns"
  FARMS ||--o{ PRODUCTS : "grows"
  FARMS ||--o{ INVENTORY : "lists"
  PRODUCTS ||--o{ INVENTORY : "tracked_as"
  FARMS ||--o{ FARM_MARKET_RELS : "connects_to"
  MARKETS ||--o{ FARM_MARKET_RELS : "connects_to"
  FARMS ||--o{ ORDERS : "fulfills"
  MARKETS ||--o{ ORDERS : "places"
  ORDERS ||--|{ ORDER_ITEMS : "contains"
  INVENTORY ||--o{ ORDER_ITEMS : "draws_from"
  FARMS ||--o{ RECURRING_ORDERS : "fulfills"
  MARKETS ||--o{ RECURRING_ORDERS : "subscribes"
  RECURRING_ORDERS ||--|{ RECURRING_ORDER_ITEMS : "contains"
  ORDERS ||--o| DELIVERIES : "shipped_via"
  USERS ||--o{ CONVERSATIONS : "participates"
  CONVERSATIONS ||--|{ MESSAGES : "contains"
  ORDERS ||--o{ NOTIFICATIONS : "triggers"
  INVENTORY ||--o{ NOTIFICATIONS : "triggers"

  USERS {
    uuid id PK
    string name
    string phone
    string email
    enum role "farmer | market | admin"
    jsonb preferences
    timestamp created_at
  }
  FARMS {
    uuid id PK
    uuid user_id FK
    string name
    string location
    point coordinates
    string specialty
    string timezone
    boolean active
  }
  MARKETS {
    uuid id PK
    uuid user_id FK
    string name
    string location
    point coordinates
    enum type "grocery | restaurant | co-op | farmers_market"
    enum delivery_pref "pickup | delivery | either"
    boolean active
  }
  PRODUCTS {
    uuid id PK
    uuid farm_id FK
    string name
    string category
    string unit
    decimal default_price
    boolean seasonal
  }
  INVENTORY {
    uuid id PK
    uuid farm_id FK
    uuid product_id FK
    decimal quantity
    decimal remaining
    decimal price
    date harvest_date
    enum status "available | partial | reserved | sold"
    timestamp listed_at
    timestamp expires_at
  }
  FARM_MARKET_RELS {
    uuid id PK
    uuid farm_id FK
    uuid market_id FK
    int priority
    int notification_delay_min
    boolean active
    jsonb delivery_preferences
  }
  ORDERS {
    uuid id PK
    uuid farm_id FK
    uuid market_id FK
    string order_number
    enum status "pending | confirmed | in_transit | delivered | cancelled"
    decimal total
    date order_date
    text notes
    timestamp created_at
  }
  ORDER_ITEMS {
    uuid id PK
    uuid order_id FK
    uuid inventory_id FK
    string product_name
    decimal quantity
    string unit
    decimal unit_price
    decimal line_total
  }
  RECURRING_ORDERS {
    uuid id PK
    uuid farm_id FK
    uuid market_id FK
    enum frequency "daily | twice_weekly | weekly | biweekly | monthly"
    string schedule_days
    date next_delivery
    boolean active
    timestamp created_at
  }
  RECURRING_ORDER_ITEMS {
    uuid id PK
    uuid recurring_order_id FK
    uuid product_id FK
    decimal quantity
    string unit
  }
  DELIVERIES {
    uuid id PK
    uuid order_id FK
    enum type "pickup | delivery"
    timestamp scheduled_at
    timestamp completed_at
    enum status "scheduled | in_transit | completed | failed"
    text notes
  }
  CONVERSATIONS {
    uuid id PK
    uuid user_id FK
    string phone_number
    enum context "inventory | order | delivery | general"
    jsonb state
    timestamp last_message_at
  }
  MESSAGES {
    uuid id PK
    uuid conversation_id FK
    enum direction "inbound | outbound"
    text body
    enum source "sms | web | system"
    jsonb ai_metadata
    timestamp created_at
  }
  NOTIFICATIONS {
    uuid id PK
    uuid market_id FK
    uuid inventory_id FK
    uuid order_id FK
    enum type "new_inventory | price_change | order_update | reminder"
    enum channel "sms | email | push"
    enum status "pending | sent | delivered | failed"
    timestamp scheduled_for
    timestamp sent_at
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
